apiVersion: apps/v1
kind: Deployment
metadata:
  name: absuite-db
  namespace: absuite
  labels:
    app: absuite-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: absuite-db
  template:
    metadata:
      labels:
        app: absuite-db
    spec:
      containers:
      - name: sqlite
        image: nouchka/sqlite3:latest
        command: ["/bin/sh"]
        args: ["-c", "mkdir -p /data && touch /data/absuite.db && while true; do sleep 3600; done"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - test
            - -f
            - /data/absuite.db
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - test
            - -f
            - /data/absuite.db
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: absuite-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: absuite-db
  namespace: absuite
spec:
  selector:
    app: absuite-db
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
