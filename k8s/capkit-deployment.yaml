apiVersion: apps/v1
kind: Deployment
metadata:
  name: capkit
  namespace: absuite
  labels:
    app: capkit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capkit
  template:
    metadata:
      labels:
        app: capkit
    spec:
      containers:
      - name: capkit
        image: absuite/capkit:latest
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: absuite-config
        env:
        - name: DATABASE_URL
          value: "file:/data/absuite.db"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: absuite-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: capkit
  namespace: absuite
spec:
  selector:
    app: capkit
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: capkit-hpa
  namespace: absuite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: capkit
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
