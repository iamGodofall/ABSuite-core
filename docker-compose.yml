services:
  # ---- Core Infrastructure ----

  absuite-db:
    image: alpine:latest
    container_name: absuite-db
    command: sh -c "touch /data/absuite.db || true && exec tail -f /dev/null"
    volumes:
      - absuite-data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /data/absuite.db"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped
    networks:
      - absuite-net

  # ---- Module Services ----

  capkit:
    build:
      context: .
      dockerfile: ./packages/capkit/Dockerfile
    container_name: absuite-capkit
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - NODE_ENV=production
      - ABSUITE_DB_PATH=/data/absuite.db
      - ABSUITE_LOG_LEVEL=${ABSUITE_LOG_LEVEL:-info}
      - CAPKIT_HMAC_SECRET=${CAPKIT_HMAC_SECRET}
      - CAPKIT_JWT_SECRET=${CAPKIT_JWT_SECRET}
      - ABSUITE_ALLOWED_ORIGINS=${ABSUITE_ALLOWED_ORIGINS:-http://localhost:3001}
    volumes:
      - absuite-data:/data
    depends_on:
      absuite-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8081/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    networks:
      - absuite-net

  edge-run:
    build:
      context: .
      dockerfile: ./packages/edge-run/Dockerfile
    container_name: absuite-edge-run
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      - NODE_ENV=production
      - ABSUITE_DB_PATH=/data/absuite.db
      - ABSUITE_LOG_LEVEL=info
      - EDGERUN_MAX_CONCURRENT=10
      - EDGERUN_QUEUE_LIMIT=100
    volumes:
      - absuite-data:/data
    depends_on:
      absuite-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8082/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    networks:
      - absuite-net

  quickbench:
    build:
      context: .
      dockerfile: ./packages/quickbench/Dockerfile
    container_name: absuite-quickbench
    ports:
      - "127.0.0.1:8083:8083"
    environment:
      - NODE_ENV=production
      - PORT=8083
      - QUICKBENCH_PORT=8083
      - QUICKBENCH_OLLAMA_URL=${QUICKBENCH_OLLAMA_URL:-http://host.docker.internal:11434}
      - ABSUITE_LOG_LEVEL=${ABSUITE_LOG_LEVEL:-info}
    depends_on:
      absuite-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8083/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - absuite-net

  connector-starter:
    build:
      context: .
      dockerfile: ./packages/connector-starter/Dockerfile
    container_name: absuite-connector-starter
    ports:
      - "127.0.0.1:8084:8084"
    environment:
      - NODE_ENV=production
      - ABSUITE_LOG_LEVEL=info
    depends_on:
      absuite-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8084/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - absuite-net

  # ---- Dashboard ----

  dashboard:
    build:
      context: .
      dockerfile: ./packages/dashboard-ui/Dockerfile
    container_name: absuite-dashboard
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - ABSUITE_LOG_LEVEL=${ABSUITE_LOG_LEVEL:-info}
      - ABSUITE_ALLOWED_ORIGINS=${ABSUITE_ALLOWED_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      - ABSUITE_ADMIN_API_KEY=${ABSUITE_ADMIN_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    depends_on:
      absuite-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - absuite-net

  # ---- Persistent Volume ----

volumes:
  absuite-data:
    driver: local

networks:
  absuite-net:
    driver: bridge
